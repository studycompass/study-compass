<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Study Compass</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; margin: 0; background: #FAF6EF; color: #4A4036; }
    .cms-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
    .cms-loading h1 { font-size: 1.5rem; color: #B0876B; }
    .cms-loading p { color: #7A6E5F; }
    .cms-loading .spinner { width: 40px; height: 40px; border: 3px solid #E8DFD0; border-top-color: #B0876B; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="nc-root"></div>
  <div class="cms-loading" id="loading">
    <div class="spinner"></div>
    <h1>Loading Study Compass CMS...</h1>
    <p>If this takes more than 10 seconds, check your GitHub OAuth configuration.</p>
  </div>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.4.0/dist/decap-cms.js"></script>
  <script>
    // Hide loading spinner once CMS mounts
    const observer = new MutationObserver(function() {
      if (document.getElementById('nc-root').children.length > 0) {
        document.getElementById('loading').style.display = 'none';
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('nc-root'), { childList: true, subtree: true });

    // Timeout — if CMS doesn't load in 15s, show error
    setTimeout(function() {
      const loading = document.getElementById('loading');
      if (loading.style.display !== 'none') {
        loading.innerHTML = '<h1>CMS failed to load</h1><p>Check your internet connection and GitHub OAuth setup. See admin/config.yml for configuration.</p>';
      }
    }, 15000);
  </script>
</body>
</html>
